<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Innovex</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hamburger" onclick="toggleMenu()">
☰
</div>

<div id="sideMenu" class="side-menu">

<h3>Categories</h3>

<div class="cat-list">

<button onclick="filterProducts('All')">
All Products
</button>

<button onclick="filterProducts('Clothing')">
Clothing
</button>

<button onclick="filterProducts('Shoes')">
Shoes
</button>

<button onclick="filterProducts('Bags')">
Bags
</button>

<button onclick="filterProducts('Accessories')">
Accessories
</button>

</div>

</div>

<div class="navbar">

<h1 class="logo">
INNOVEX
</h1>

<div class="nav-actions">

<input
type="text"
id="search"
placeholder="Search products..."
>

<button onclick="location.href='cart.html'">
Cart
</button>

<button onclick="logout()">
Logout
</button>

</div>

</div>

<section class="hero">

<div class="hero-content">

<h1>
Premium Fashion Store
</h1>

<p>
Modern Shopping Experience
</p>

<button>
Shop Now
</button>

</div>

</section>

<p class="cart-info-bar">
Items:
<span id="count">
0
</span>
</p>

<div id="products"></div>

<div id="toast"></div>

<script src="auth.js"></script>
<script src="script.js"></script>

</body>
</html>
