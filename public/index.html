<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Innovex</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="navbar">

    <h1 class="logo">INNOVEX</h1>

    <input type="text" id="search" placeholder="Search products...">

    <div class="nav-right">

      <button onclick="toggleDarkMode()">🌙</button>

      <button onclick="location.href='wishlist.html'">
        ❤️ Wishlist
      </button>

      <button onclick="location.href='login.html'">
        👤 Login
      </button>

    </div>

  </div>

  <section class="hero">

    <h1>Modern Fashion Store</h1>

    <p>Discover premium collections</p>

    <button>Shop Now</button>

  </section>

  <div class="categories">

    <button onclick="filterProducts('All')">All</button>
    <button onclick="filterProducts('Clothing')">Clothing</button>
    <button onclick="filterProducts('Shoes')">Shoes</button>
    <button onclick="filterProducts('Accessories')">Accessories</button>
    <button onclick="filterProducts('Bags')">Bags</button>

  </div>

  <div id="products"></div>

  <div id="toast"></div>

  <script src="script.js"></script>

</body>

</html>
