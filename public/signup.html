<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Innovex Signup
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body class="auth-body">

<div class="auth-container">

<!-- LEFT SIDE -->

<div class="auth-left">

<h1>
INNOVEX
</h1>

<p>
Create Your Premium Shopping Account
</p>

</div>

<!-- RIGHT SIDE -->

<div class="auth-right">

<form class="auth-form">

<h2>
Create Account
</h2>

<p class="sub-text">
Join Innovex Fashion Store
</p>

<input
type="text"
id="signupName"
placeholder="Full Name"
required
>

<input
type="email"
id="signupEmail"
placeholder="Email Address"
required
>

<input
type="password"
id="signupPassword"
placeholder="Create Password"
required
>

<button
type="button"
onclick="signup()">

Create Account

</button>

<p class="bottom-text">

Already have an account?

<a href="login.html">

Login

</a>

</p>

</form>

</div>

</div>

<script src="auth.js"></script>

</body>
</html>
