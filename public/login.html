<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Innovex Login
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body class="auth-body">

<div class="auth-container">

<div class="auth-left">

<h1>
INNOVEX
</h1>

<p>
Luxury Fashion Store
</p>

<img
src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1200&q=80"
>

</div>

<div class="auth-right">

<form class="auth-form">

<h2>
Welcome Back
</h2>

<p class="sub-text">
Login To Continue Shopping
</p>

<input
type="email"
id="loginEmail"
placeholder="Enter Email"
required
>

<input
type="password"
id="loginPassword"
placeholder="Enter Password"
required
>

<button
type="button"
onclick="login()">

Login

</button>

<p class="bottom-text">

Don't have an account?

<a href="signup.html">

Signup

</a>

</p>

</form>

</div>

</div>

<script src="auth.js"></script>

</body>
</html>
